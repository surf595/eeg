version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: eeg-postgres
    environment:
      POSTGRES_DB: eeg
      POSTGRES_USER: eeg
      POSTGRES_PASSWORD: eeg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: eeg-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
